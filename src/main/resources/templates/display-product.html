<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout1}"
      xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Edit Products</title>

</head>
<body>
<div class="p-3" layout:fragment="content1">
    <h2>Edit your product</h2>
    <form method="post" th:action="@{/admin/editProduct}" th:object="${product}">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Name</label>
            <input class="form-control" type="text" th:field="*{name}">
            <span class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
        </div>

        <div class="mb-3">
            <label class="form-label">Price</label>
            <input class="form-control" type="text" th:field="*{price}">
            <span class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
        </div>

        <div class="mb-3">
            <label class="form-label">Quantity</label>
            <input class="form-control" type="text" th:field="*{quantity}">
            <span class="text-danger" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></span>
        </div>

        <button type="submit" class="btn btn-primary">Save</button>
    </form>


</div>
</body>
</html>
