<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout1}"
      xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Products</title>

</head>
<body>
    <div class="p-3" layout:fragment="content1">
        <div class="card mb-3">
            <div class="card-body">
                <form method="get" th:action="@{/user/index}">
                    <div class="input-group">
                        <label class="input-group-text">Keyword:</label>
                        <input type="text" name="keyword" class="form-control"
                               th:value="${keyword}" placeholder="Search products...">
                        <button class="btn btn-primary" type="submit">Search</button>
                        <a th:href="@{/user/index}" class="btn btn-outline-secondary">Clear</a>
                    </div>
                </form>
            </div>
        </div>
        <div class="p-3" sec:authorize="hasRole('ADMIN')">
            <a class="btn btn-primary" th:href="@{/admin/newProduct}">Add new</a>
        </div>
        <table class="table">
            <thead>
                <th>ID</th><th>Name</th><th>Price</th><th>Quantity</th><th sec:authorize="hasRole('ADMIN')">Action</th>
            </thead>
            <tbody>
                <tr th:each="p:${productsList}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.name}"></td>
                    <td th:text="${p.price}"></td>
                    <td th:text="${p.quantity}"></td>
                    <td sec:authorize="hasRole('ADMIN')">
                        <form method="post" th:action="@{/admin/delete(id=${p.id})}">
                            <button type="submit" class="btn btn-danger">Delete</button>
                        </form>
                        <a th:href="@{/admin/displayProduct(id=${p.id})}"  class="btn btn-success">
                            Edit
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
